<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Journal - Automated Routing</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      margin: 0;
      letter-spacing: -0.002em;
      -webkit-font-smoothing: antialiased;
      background-color: #f8fafc; /* slate-50 */
    }
    
    .blob-character { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .glassmorphism {
      background: rgba(255, 255, 255, 1);
      border-radius: 32px;
      box-shadow: 0 15px 40px rgba(42, 58, 94, 0.05);
      border: 1px solid rgba(255, 255, 255, 1);
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontWeight: {
            light: '400',
            normal: '400',
            medium: '500',
            semibold: '600',
            bold: '600',
            extrabold: '600',
          },
          colors: {
            primary: '#69A1FB',
            golden: '#FFC107',
            appbg: '#F4F6FB',
            panel: '#ffffff',
            navy: '#2A3A5E',
            textgray: '#7C8DAB',
            mood: {
              angry: '#ff8787',
              anxious: '#ffb067',
              sad: '#74bde0',
              neutral: '#cbd5e1',
              happy: '#fde047',
              loved: '#f9a8d4'
            }
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'float-fast': 'float 3s ease-in-out infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'tremble': 'tremble 0.1s linear infinite',
            'flash-sync': 'flash 5s infinite',
            'lightning': 'lightning 5s infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            tremble: {
              '0%, 100%': { transform: 'translate(0.5px, 0.5px)' },
              '25%': { transform: 'translate(-0.5px, -0.5px)' },
              '50%': { transform: 'translate(-0.5px, 0.5px)' },
              '75%': { transform: 'translate(0.5px, -0.5px)' },
            },
            flash: {
              '0%, 1%, 3%, 50%, 51%, 53%, 100%': { filter: 'brightness(1)' },
              '2%, 52%': { filter: 'brightness(1.3)' },
            },
            lightning: {
              '0%, 1%, 3%, 50%, 51%, 53%, 100%': { opacity: '0' },
              '2%, 52%': { opacity: '1' },
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes thunder-flicker {
      0%, 80%, 90%, 100% { opacity: 0; }
      82%, 87% { opacity: 0.8; }
      85% { opacity: 0.2; }
    }
    .animate-thunder-flicker {
      animation: thunder-flicker 4s infinite linear;
    }
  </style>
</head>
<body class="bg-appbg text-navy font-medium min-h-screen relative overflow-hidden">
  
  <div id="root" class="relative z-10 max-w-md mx-auto h-screen flex flex-col bg-transparent overflow-hidden"></div>

  <script type="text/babel">
    const { motion, AnimatePresence } = window.Motion;

    // --- CUSTOM SHAPES ---
    const EmotionShape = ({ emotion, swipeDirection = 1, activeGlow = false, intensity = 2 }) => {
      const strokeColor = "#2A3A5E";
      const blushColor = "#FFB4C0";
      
      const renderFace = () => {
         const eyes = (
            <g>
               <circle cx="36" cy="55" r="5" fill="#111827" />
               <circle cx="34.5" cy="53" r="1.5" fill="white" opacity="0.9" />
               <circle cx="64" cy="55" r="5" fill="#111827" />
               <circle cx="62.5" cy="53" r="1.5" fill="white" opacity="0.9" />
            </g>
         );

         switch(emotion) {
            case 'Happy': return (
               <g>
                  {eyes}
                  {intensity === 1 && <path d="M 48 62 Q 50 63 52 62" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity === 2 && <path d="M 47 62 Q 50 64 53 62" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity === 3 && <path d="M 45 61 Q 50 68 55 61 Z" fill="#111827" />}
                  <ellipse cx="28" cy="58" rx="3.5" ry="2" fill={blushColor} opacity="0.6" />
                  <ellipse cx="72" cy="58" rx="3.5" ry="2" fill={blushColor} opacity="0.6" />
               </g>
            );
            case 'Neutral': return (
               <g>
                  {eyes}
                  {intensity === 1 && <path d="M 48 62 Q 50 63 52 62" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity === 2 && <path d="M 48 62 Q 50 63 52 62" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity === 3 && <path d="M 47 62 L 53 62" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
               </g>
            );
            case 'Anxious': return (
               <g>
                  {eyes}
                  {intensity === 1 && <path d="M 47.5 62 L 52.5 62" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity === 2 && <path d="M 47.5 63 Q 48.75 61.5 50 63 T 52.5 63" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity === 3 && <path d="M 46 64 Q 48 61 50 64 T 54 64" fill="none" stroke="#111827" strokeWidth="2" strokeLinecap="round" />}
                  <ellipse cx="28" cy="58" rx="3" ry="2" fill={blushColor} opacity={intensity === 3 ? "0.8" : "0.6"} />
                  <ellipse cx="72" cy="58" rx="3" ry="2" fill={blushColor} opacity={intensity === 3 ? "0.8" : "0.6"} />
               </g>
            );
            case 'Sad': return (
               <g>
                  {eyes}
                  {intensity === 1 && <path d="M 48 63 Q 50 62 52 63" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity === 2 && <path d="M 48 63 Q 50 61.5 52 63" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity === 3 && <path d="M 47 64 Q 50 60 53 64" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity >= 2 && (
                     <motion.path d="M36,61 C37.5,64 37.5,65 36,65 C34.5,65 34.5,64 36,61 Z" fill="#38bdf8" animate={{ y: [0, 10], opacity: [0, 1, 0] }} transition={{ duration: 1.5, repeat: Infinity, ease: "easeIn" }} />
                  )}
                  {intensity === 3 && (
                     <motion.path d="M64,61 C65.5,64 65.5,65 64,65 C62.5,65 62.5,64 64,61 Z" fill="#38bdf8" animate={{ y: [0, 10], opacity: [0, 1, 0] }} transition={{ duration: 1.5, delay: 0.5, repeat: Infinity, ease: "easeIn" }} />
                  )}
               </g>
            );
            case 'Angry': return (
               <g>
                  {eyes}
                  {intensity === 1 && <path d="M 48 63 Q 50 62 52 63" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity === 2 && <path d="M 47 63 Q 50 60 53 63" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity === 3 && <path d="M 46 64 Q 50 59 54 64" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity >= 2 && (
                     <g>
                        <line x1="33" y1="47" x2="38" y2="49" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />
                        <line x1="67" y1="47" x2="62" y2="49" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />
                     </g>
                  )}
                  {intensity === 3 && (
                     <g>
                        <line x1="31" y1="45" x2="40" y2="49" stroke="#111827" strokeWidth="2" strokeLinecap="round" />
                        <line x1="69" y1="45" x2="60" y2="49" stroke="#111827" strokeWidth="2" strokeLinecap="round" />
                     </g>
                  )}
                  {intensity >= 2 && <path d="M 65 25 L 60 35 L 68 35 L 63 45" stroke="#FFFFFF" strokeWidth="1.5" fill="none" className="animate-thunder-flicker" />}
               </g>
            );
            case 'Loved': return (
               <g>
                  {eyes}
                  {intensity === 1 && <path d="M 48 62 Q 50 64 52 62" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity === 2 && <path d="M 47 62 Q 50 65 53 62" fill="none" stroke="#111827" strokeWidth="1.5" strokeLinecap="round" />}
                  {intensity === 3 && <path d="M 45 61 Q 50 68 55 61 Z" fill="#111827" />}
                  <ellipse cx="28" cy="58" rx="4" ry="2.5" fill={blushColor} opacity="0.8" />
                  <ellipse cx="72" cy="58" rx="4" ry="2.5" fill={blushColor} opacity="0.8" />
                  <g className="animate-float" fill="#fb7185">
                     {intensity >= 1 && <path d="M12 21l-1.4-1.3C5.4 15.4 2 12.3 2 8.5 2 5.4 4.4 3 7.5 3c1.7 0 3.4.8 4.5 2.1C13.1 3.8 14.8 3 16.5 3 19.6 3 22 5.4 22 8.5c0 3.8-3.4 6.9-8.6 11.5L12 21z" transform="translate(68, 8) scale(0.8)" />}
                     {intensity >= 2 && <path d="M12 21l-1.4-1.3C5.4 15.4 2 12.3 2 8.5 2 5.4 4.4 3 7.5 3c1.7 0 3.4.8 4.5 2.1C13.1 3.8 14.8 3 16.5 3 19.6 3 22 5.4 22 8.5c0 3.8-3.4 6.9-8.6 11.5L12 21z" transform="translate(85, 25) scale(0.4)" />}
                     {intensity === 3 && <path d="M12 21l-1.4-1.3C5.4 15.4 2 12.3 2 8.5 2 5.4 4.4 3 7.5 3c1.7 0 3.4.8 4.5 2.1C13.1 3.8 14.8 3 16.5 3 19.6 3 22 5.4 22 8.5c0 3.8-3.4 6.9-8.6 11.5L12 21z" transform="translate(75, -5) scale(0.6)" />}
                  </g>
               </g>
            );
            default: return null;
         }
      }

      const bgGradients = {
        'Angry': ['#FFD8D8', '#FF9493'],
        'Anxious': ['#DCE4FF', '#ADB9EE'],
        'Sad': ['#D9F3FF', '#90DCFF'],
        'Neutral': ['#EFEFEF', '#C7C7C7'],
        'Happy': ['#FFF1D7', '#FFDF9E'],
        'Loved': ['#FFE4F2', '#FFB5DC']
      };
      const [gradStart, gradEnd] = bgGradients[emotion] || ['#ffffff', '#ffffff'];

      const glowColors = {
        'Angry': 'rgba(255, 148, 147, 0.8)',
        'Anxious': 'rgba(173, 185, 238, 0.8)',
        'Sad': 'rgba(144, 220, 255, 0.8)',
        'Neutral': 'rgba(199, 199, 199, 0.8)',
        'Happy': 'rgba(255, 223, 158, 0.8)',
        'Loved': 'rgba(255, 181, 220, 0.8)'
      };
      
      const animClass = emotion === 'Anxious' ? 'animate-tremble' : 'animate-float-fast';
      const baseShadow = activeGlow 
         ? `drop-shadow(0 15px 20px rgba(0,0,0,0.08)) drop-shadow(0 0 20px ${glowColors[emotion] || glowColors['Neutral']}) drop-shadow(0 0 10px ${glowColors[emotion] || glowColors['Neutral']})`
         : "drop-shadow(0 15px 20px rgba(0,0,0,0.08))";
      
      return (
        <motion.svg 
           className={`w-[130%] h-[130%] -ml-[15%] -mt-[15%] transition-transform duration-300 overflow-visible ${animClass}`} 
           viewBox="0 0 100 100" 
           xmlns="http://www.w3.org/2000/svg"
           initial={{ filter: baseShadow }}
           animate={{ 
             filter: activeGlow
               ? baseShadow
               : emotion === 'Happy' 
                 ? [`${baseShadow} drop-shadow(0px 0px 8px rgba(255, 215, 0, 0.5))`, `${baseShadow} drop-shadow(0px 0px 18px rgba(255, 215, 0, 0.5))`, `${baseShadow} drop-shadow(0px 0px 8px rgba(255, 215, 0, 0.5))`] 
                 : emotion === 'Neutral'
                   ? [`${baseShadow} drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.5))`, `${baseShadow} drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.5))`, `${baseShadow} drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.5))`]
                   : baseShadow 
           }}
           transition={(emotion === 'Happy' || emotion === 'Neutral') && !activeGlow
               ? { duration: 3, repeat: Infinity, ease: 'easeInOut' } 
               : { duration: 0.3 }}
        >
          <defs>
            <radialGradient id={`grad-${emotion}`} cx="35%" cy="25%" r="80%">
              <stop offset="0%" stopColor={gradStart} />
              <stop offset="100%" stopColor={gradEnd} />
            </radialGradient>
          </defs>
          
          <motion.g 
             initial={{ scaleX: 1.15, scaleY: 0.85, x: swipeDirection > 0 ? 15 : -15, rotate: swipeDirection > 0 ? 10 : -10 }}
             animate={{ scaleX: 1, scaleY: 1, x: 0, rotate: 0 }}
             transition={{ type: "spring", stiffness: 250, damping: 15, mass: 1, restDelta: 0.001 }}
             style={{ transformOrigin: "50px 80px" }}
          >
             <motion.g 
                style={{ transformOrigin: "50px 80px" }}
                animate={{ scaleY: [1, 1.05, 1], scaleX: [1, 0.98, 1] }} 
                transition={{ duration: 4, repeat: Infinity, ease: "easeInOut" }}
             >
                {/* Base Jelly Blob */}
                <path d="M 50 20 C 80 20, 85 64, 75 78 C 65 83, 35 83, 25 78 C 15 64, 20 20, 50 20 Z" fill={`url(#grad-${emotion})`} />
                
                {/* Angry Flash Overlay perfectly synced with background thunder */}
                {emotion === 'Angry' && (
                   <path 
                      d="M 50 20 C 80 20, 85 64, 75 78 C 65 83, 35 83, 25 78 C 15 64, 20 20, 50 20 Z" 
                      fill="#f87171" 
                      className="animate-thunder-flicker"
                   />
                )}
                
                <g transform="translate(0, -8)">
                  {renderFace()}
                </g>
             </motion.g>
          </motion.g>
        </motion.svg>
      );
    };

    // --- GENERIC EXERCISE UTILITIES ---
    const InstructionCard = ({ title, desc, icon, duration, onComplete, setProgress }) => {
       const [timeLeft, setTimeLeft] = React.useState(duration || 0);
       const [running, setRunning] = React.useState(false);

       React.useEffect(() => {
          if(!running || timeLeft <= 0) return;
          const t = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
          return () => clearTimeout(t);
       }, [running, timeLeft]);

       React.useEffect(() => {
          if (setProgress && duration) setProgress(((duration - timeLeft) / duration) * 100);
       }, [timeLeft, duration, setProgress]);

       return (
         <div className="flex flex-col items-center justify-center h-full text-center px-4 w-full">
            <div className="w-24 h-24 bg-white/60 rounded-[32px] flex items-center justify-center mb-8 shadow-sm border border-white">
               <span className="text-5xl">{icon}</span>
            </div>
            <h2 className="text-3xl font-bold text-slate-800 mb-4">{title}</h2>
            <p className="text-slate-500 text-[17px] mb-12 leading-relaxed">{desc}</p>
            
            {duration ? (
               <button 
                  onClick={() => { if(timeLeft === 0) onComplete(); else setRunning(true); }}
                  disabled={running && timeLeft > 0}
                  className={`w-full py-4 rounded-full font-bold text-lg shadow-md outline-none transition-all ${timeLeft === 0 ? 'bg-green-500 text-white hover:scale-[1.02]' : (running ? 'bg-slate-200 text-slate-500 shadow-none' : 'bg-primary text-white hover:scale-[1.02]')}`}>
                  {timeLeft === 0 ? 'Complete Exercise' : (running ? `${timeLeft}s Remaining` : `Start ${duration}s Timer`)}
               </button>
            ) : (
               <button onClick={onComplete} className="w-full py-4 rounded-full bg-primary text-white shadow-md hover:scale-[1.02] transition-all font-bold text-lg">Complete Exercise</button>
            )}
         </div>
       );
    };

    const InteractivePrompt = ({ title, desc, type, onComplete, setProgress }) => {
       const [val, setVal] = React.useState(type === 'slider' ? 5 : '');
       
       React.useEffect(() => {
          if (setProgress) setProgress(val !== '' ? 100 : 0);
       }, [val, setProgress]);
       
       return (
         <div className="flex flex-col h-full w-full py-2">
           <h2 className="text-3xl font-bold text-slate-800 mb-4 leading-tight">{title}</h2>
           <p className="text-slate-500 text-[17px] mb-8 font-light">{desc}</p>
           
           {type === 'slider' ? (
              <div className="flex-1 flex flex-col justify-center items-center w-full px-4 gap-8">
                 <span className="text-[80px] font-bold text-slate-800">{val}</span>
                 <input type="range" min="1" max="10" value={val} onChange={(e) => setVal(e.target.value)} className="w-full h-3 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                 <div className="w-full flex justify-between text-slate-400 font-medium"><span>Mild (1)</span><span>Extreme (10)</span></div>
              </div>
           ) : (
             <div className="flex-1 rounded-[28px] overflow-hidden glassmorphism focus-within:border-slate-300 transition-all mb-8 p-1">
               <textarea 
                  value={val} onChange={(e) => setVal(e.target.value)} placeholder="Type your thoughts here..."
                  className="w-full h-full bg-transparent text-slate-800 text-[17px] p-6 resize-none outline-none font-light placeholder:text-slate-400"
               ></textarea>
             </div>
           )}
           <button onClick={onComplete} disabled={type === 'text' && !val} className="w-full mt-auto py-4 rounded-full bg-primary text-white font-bold text-lg shadow-md hover:scale-[1.02] disabled:opacity-50 disabled:scale-100 transition-all">Save Response</button>
         </div>
       );
    };

    // --- LIBRARY COMPONENTS ---
    const BoxBreathing = ({ onComplete, setProgress }) => {
      const [phase, setPhase] = React.useState('Inhale'); 
      const [scale, setScale] = React.useState(1.5);
      const [cycles, setCycles] = React.useState(0);

      React.useEffect(() => {
        const sequence = [{ text: 'Inhale', scale: 1.5 }, { text: 'Hold', scale: 1.5 }, { text: 'Exhale', scale: 1 }, { text: 'Hold', scale: 1 }];
        let idx = 0;
        let count = 0;
        const interval = setInterval(() => { 
           idx++;
           if (idx >= 4) {
              idx = 0; count++; setCycles(count);
              if (count >= 4) { clearInterval(interval); setTimeout(onComplete, 1000); return; }
           }
           setPhase(sequence[idx].text); setScale(sequence[idx].scale); 
        }, 4000);
        return () => clearInterval(interval);
      }, []); // Empty dependency array prevents mouse movements from breaking the timer

      React.useEffect(() => {
         if (setProgress) setProgress((cycles / 4) * 100);
      }, [cycles, setProgress]);

      return (
        <div className="flex flex-col items-center justify-center h-full pt-10 px-4">
          <div className="relative w-48 h-48 flex items-center justify-center mb-16 shrink-0">
            <div className="absolute inset-0 rounded-full bg-slate-300/30 transition-transform ease-in-out duration-[4000ms]" style={{ transform: `scale(${scale})` }}></div>
            <div className="w-24 h-24 rounded-full bg-white flex items-center justify-center z-10 shadow-lg border border-slate-100">
               <span className="text-xl font-bold tracking-wide text-slate-800">{phase}</span>
            </div>
          </div>
          <h2 className="text-3xl font-bold text-slate-800 mb-2">Box Breathing</h2>
          <p className="text-slate-500 font-light text-lg mb-8 text-center">Breathe with the circle. Release the tension.</p>
          <div className="w-full flex-1 flex flex-col justify-end pb-8">
             <button onClick={onComplete} className="w-full py-4 rounded-full bg-primary text-white shadow-md font-bold text-lg hover:scale-[1.02] transition-all border-none">Skip to Finish</button>
          </div>
        </div>
      );
    };

    const PhysiologicalSigh = ({ onComplete, setProgress }) => {
      const [phase, setPhase] = React.useState('Inhale 1'); 
      const [scale, setScale] = React.useState(1.2);
      const [cycles, setCycles] = React.useState(0);

      React.useEffect(() => {
        const sequence = [{ text: 'Inhale 1', scale: 1.2, duration: 1500 }, { text: 'Inhale 2', scale: 1.5, duration: 1000 }, { text: 'Exhale...', scale: 1.0, duration: 4000 }];
        let idx = 0; let pTimeout; let count = 0;
        const playSequence = () => {
           setPhase(sequence[idx].text); setScale(sequence[idx].scale);
           pTimeout = setTimeout(() => { 
              idx++;
              if (idx >= 3) {
                 idx = 0; count++; setCycles(count);
                 if (count >= 4) { setTimeout(onComplete, 1000); return; }
              }
              playSequence(); 
           }, sequence[idx].duration);
        };
        playSequence(); return () => clearTimeout(pTimeout);
      }, []); // Empty dependency array prevents stalling

      React.useEffect(() => {
         if (setProgress) setProgress((cycles / 4) * 100);
      }, [cycles, setProgress]);

      return (
        <div className="flex flex-col items-center justify-center h-full pt-10 text-center px-4 w-full">
          <div className="relative w-48 h-48 flex items-center justify-center mb-16 shrink-0">
            <div className={`absolute inset-0 rounded-full bg-slate-300/30 transition-transform ${phase === 'Exhale...' ? 'ease-out duration-[4000ms]' : 'ease-out duration-[1000ms]'}`} style={{ transform: `scale(${scale})` }}></div>
            <div className="w-24 h-24 rounded-full bg-white flex items-center justify-center z-10 shadow-lg border border-slate-100">
               <span className="text-lg font-bold tracking-wide text-slate-800 text-center px-2">{phase}</span>
            </div>
          </div>
          <h2 className="text-3xl font-bold text-slate-800 mb-2">Physiological Sigh</h2>
          <p className="text-slate-500 font-light text-[17px] mb-8">Two quick inhales through the nose, one long exhale through the mouth.</p>
          <div className="w-full flex-1 flex flex-col justify-end pb-8">
             <button onClick={onComplete} className="w-full py-4 rounded-full bg-primary text-white shadow-md font-bold text-lg hover:scale-[1.02] transition-all border-none">Skip to Finish</button>
          </div>
        </div>
      );
    };

    const Grounding54321 = ({ onComplete, setProgress }) => {
       const steps = [
         { count: 5, action: 'things you can see', placeholder: 'A blue cup, the sky...' },
         { count: 4, action: 'things you can touch', placeholder: 'The chair, my shirt...' },
         { count: 3, action: 'things you can hear', placeholder: 'A clock, traffic...' },
         { count: 2, action: 'things you can smell', placeholder: 'Coffee, rain...' },
         { count: 1, action: 'thing you can taste', placeholder: 'Mint, water...' },
       ];

                   </button>
                )}
             </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
